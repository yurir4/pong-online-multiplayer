<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE ARENA - Neon Striker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-container">
        <h1>BATTLE <span class="online">ARENA</span></h1>
        
        <div id="main-menu">
            <div class="input-group">
                <label for="username">Seu Nome de Usuário:</label>
                <input type="text" id="username" placeholder="Digite seu nome..." maxlength="15">
            </div>

            <div class="input-group">
                <label>Cor da sua Raquete:</label>
                <div class="color-picker">
                    <input type="color" id="paddleColor" value="#007AFF">
                </div>
            </div>

            <div class="button-group">
                <button id="btn-solo" class="btn">Jogar Contra a Máquina</button>
                <button id="btn-online" class="btn btn-primary">Multiplayer Online</button>
                <button id="btn-ranking" class="btn btn-ranking">Ranking Today</button>
            </div>
        </div>

        <div id="ranking-panel" style="display: none;">
            <h2 style="color: #FFCC00;">TOP 50 TODAY</h2>
            <div class="ranking-list" id="ranking-list"></div>
            <button id="btn-back-menu" class="btn" style="margin-top: 20px;">Voltar</button>
        </div>
    </div>

    <canvas id="pongCanvas" width="800" height="400" style="display: none;"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
